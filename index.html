<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just one question...</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #111; color: #fff; text-align: center; overflow: hidden; margin: 0;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 30px; color: #ccc; }
        .buttons { position: relative; width: 100%; height: 100px; }
        button { 
            font-size: 18px; padding: 12px 30px; margin: 10px; cursor: pointer; 
            border: none; border-radius: 50px; font-weight: bold; transition: 0.2s;
        }
        #yesBtn { background-color: #e50914; color: white; }
        #yesBtn:hover { transform: scale(1.1); }
        #noBtn { background-color: #333; color: white; position: relative; }
    </style>
</head>
<body>
    <div id="content">
        <h1>Action! 🎬 Oru mukkiyamana kelvi...</h1>
        <p>Will you be my girlfriend?</p>
        <div class="buttons">
            <button id="yesBtn" onclick="sayYes()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 150);
            btn.style.position = 'fixed';
            btn.style.left = `${x}px`;
            btn.style.top = `${y}px`;
        }

        function sayYes() {
            document.getElementById('content').innerHTML = '<h1>Blockbuster Hit! 🍿💖</h1><p>Check your WhatsApp...</p>';
        }
    </script>
</body>
</html>
